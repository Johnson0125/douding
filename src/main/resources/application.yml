server:
  port: 8080
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  undertow:
    threads:
      io: 16
      worker: 120
    buffer-size: 2048
    direct-buffers: true

datasource:
  db:
    databaseDriver: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    databaseUrl: jdbc:mysql://127.0.0.1:3306/douding?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&useSSL=false&autoReconnect=true&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&nullCatalogMeansCurrent=true


ebean:
  packages: com.douding.douding.domain
  ddl:
    generate: true
    run: true
  migration:
    run: false
  debug:
    sql: true
    lazyload: false
    logging:
      logfilesharing: all
      directory: logs
      iud: sql
      query: sql
      sqlquery: sql
      txnCommit: none
#  mappingLocations: classpath:/ebean-xml-mappings
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: root
#    url: jdbc:mysql://127.0.0.1:3306/douding?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&useSSL=false&autoReconnect=true&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&nullCatalogMeansCurrent=true
    hikari:
      maximum-pool-size: 10  # ?????
      minimum-idle: 5 # ?????
      connection-timeout: 2000 # ????????? ??30s
      pool-name: ebean-hikari # ?????
      idle-timeout: 600000 # ?????????????????????????????
      auto-commit: true # ??????
      max-lifetime: 1800000 # ?????????30??
      # connection-test-query: SELECT 1  # ??????????
      validation-timeout: 1000 #
      # schema: ??????? postgresql ???????
      jdbc-url: jdbc:mysql://127.0.0.1:3306/douding?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&useSSL=false&autoReconnect=true&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&nullCatalogMeansCurrent=true


  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss